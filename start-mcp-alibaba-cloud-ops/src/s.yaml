edition: 3.0.0
name: mcp-server-app
access: "{{ access }}"

vars: #
  region: "{{ region }}"

resources:
  start-mcp-alibaba-cloud-ops:
    component: fcai-mcp-server
    props:
      region: ${vars.region}
      description: mcp server deployed by devs
      transport: stdio
      runtime: python3.10
      startCommand: alibaba-cloud-ops-mcp-server
      cpu: 2
      memorySize: 4096
      role: {{ serviceRole }}
      enableAuth: true